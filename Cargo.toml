[workspace]
members = [".", "crates/oif-sim-core"]
resolver = "2"

[package]
name = "open_infinifactory"
version = "0.1.0"
edition = "2021"
default-run = "open_infinifactory"

[lib]
path = "src/lib.rs"

[[bin]]
name = "open_infinifactory"
path = "src/main.rs"

[[bin]]
name = "oif-debug-http"
path = "src/bin/oif-debug-http.rs"

[[bin]]
name = "export_fixture"
path = "src/bin/export_fixture.rs"

[dependencies]
bevy = { version = "0.18.1", features = ["experimental_bevy_ui_widgets"] }
inventory = "0.3"
paste = "1"
ron = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-sys = { version = "0.3", features = ["Storage", "Window"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tiny_http = "0.12"

[features]
default = []
webgpu = ["bevy/webgpu"]

[package.metadata.android]
package = "dev.openinfinifactory.prototype"
apk_name = "OpenInfiniFactory"
assets = "assets"
build_targets = ["aarch64-linux-android"]
runtime_libs = "target/android-libs"

[package.metadata.android.application]
label = "OpenInfiniFactory"
theme = "@android:style/Theme.NoTitleBar.Fullscreen"
debuggable = false
